<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .form-group input { width: 100%; }
        .error-msg {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            display: none;
            padding: 8px;
            border-radius: 8px;
            background: rgba(239,68,68,0.1);
        }
        .success-msg {
            color: var(--success);
            font-size: 13px;
            text-align: center;
            display: none;
            padding: 8px;
            border-radius: 8px;
            background: rgba(16,185,129,0.1);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h2 onclick="window.location.href='index.html'">🔄 SkillSwap</h2>
    <div class="nav-right">
        <button class="mode-btn" onclick="toggleDark()">🌙</button>
    </div>
</nav>

<div class="center">
    <div class="login-card">
        <h2>👋 Welcome</h2>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-group">
            <input type="email" id="l-email" placeholder="Email address" />
            <input type="password" id="l-pass" placeholder="Password" />
            <div class="error-msg" id="login-error"></div>
            <div class="success-msg" id="login-success"></div>
            <button class="btn-main" id="login-btn" onclick="doLogin()">Login</button>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-group" style="display:none">
            <input type="text" id="r-username" placeholder="Username" />
            <input type="email" id="r-email" placeholder="Email address" />
            <input type="password" id="r-pass" placeholder="Password" />
            <div class="error-msg" id="register-error"></div>
            <div class="success-msg" id="register-success"></div>
            <button class="btn-main" id="register-btn" onclick="doRegister()">Create Account</button>
        </div>

        <div class="divider">— or —</div>
        <button class="btn-back" onclick="window.location.href='index.html'">Browse Skills Without Login</button>
    </div>
</div>

<footer>SkillSwap &copy; 2025 — Trade skills, not money 💜</footer>

<script>
    const API = 'http://localhost:8080/api/users';
    const BASE = 'http://localhost:8080';

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
        document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
        document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = type === 'error' ? 'error-msg' : 'success-msg';
        el.style.display = 'block';
    }

    function hideMsg(id) {
        document.getElementById(id).style.display = 'none';
    }

    async function setOnline(token) {
        try {
            await fetch(BASE + '/presence/online', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });
        } catch (e) {
            console.error('Could not set online status', e);
        }
    }

    async function doLogin() {
        const email = document.getElementById('l-email').value.trim();
        const password = document.getElementById('l-pass').value;
        hideMsg('login-error'); hideMsg('login-success');

        if (!email || !password) return showMsg('login-error', '❌ Please fill in all fields', 'error');

        const btn = document.getElementById('login-btn');
        btn.disabled = true; btn.textContent = 'Logging in...';

        try {
            const res = await fetch(API + '/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('username', data.username);

                // ✅ Set user online after login
                await setOnline(data.token);

                showMsg('login-success', '✅ Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showMsg('login-error', '❌ Wrong email or password', 'error');
            }
        } catch (e) {
            showMsg('login-error', '❌ Cannot connect to server. Is it running on port 8080?', 'error');
        }

        btn.disabled = false; btn.textContent = 'Login';
    }

    async function doRegister() {
        const username = document.getElementById('r-username').value.trim();
        const email = document.getElementById('r-email').value.trim();
        const password = document.getElementById('r-pass').value;
        hideMsg('register-error'); hideMsg('register-success');

        if (!username || !email || !password) return showMsg('register-error', '❌ Please fill in all fields', 'error');

        const btn = document.getElementById('register-btn');
        btn.disabled = true; btn.textContent = 'Creating account...';

        try {
            const res = await fetch(API + '/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (res.ok) {
                showMsg('register-success', '✅ Account created! Please login.', 'success');
                setTimeout(() => {
                    switchTab('login');
                    document.getElementById('l-email').value = email;
                }, 1500);
            } else {
                const text = await res.text();
                showMsg('register-error', '❌ ' + (text || 'Registration failed'), 'error');
            }
        } catch (e) {
            showMsg('register-error', '❌ Cannot connect to server. Is it running on port 8080?', 'error');
        }

        btn.disabled = false; btn.textContent = 'Create Account';
    }

    function toggleDark() {
        document.body.classList.toggle('dark');
        document.querySelector('.mode-btn').textContent =
            document.body.classList.contains('dark') ? '☀️' : '🌙';
        localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    }

    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
        document.querySelector('.mode-btn').textContent = '☀️';
    }

    document.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
            const loginVisible = document.getElementById('login-form').style.display !== 'none';
            loginVisible ? doLogin() : doRegister();
        }
    });
</script>

</body>
</html>
